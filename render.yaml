services:
  - type: web
    name: creative-brief-maker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ASANA_TOKEN
        sync: false   # set manually in Render dashboard — never commit tokens
    healthCheckPath: /
